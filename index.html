<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Para Ti ❤️</title>

<style>
body{
  margin:0;
  background:#111827;
  color:white;
  font-family:Arial,sans-serif;
  text-align:center;
}

#login{
  height:100vh;
  display:flex;
  flex-direction:column;
  justify-content:center;
  align-items:center;
}

input{
  padding:12px;
  border-radius:10px;
  border:none;
  width:250px;
}

button{
  padding:12px 20px;
  border:none;
  border-radius:10px;
  margin-top:10px;
  cursor:pointer;
}

#contenido{
  display:none;
  padding:30px;
}

@keyframes aparecer{
  from{
    opacity:0;
    transform:scale(.8);
  }
  to{
    opacity:1;
    transform:scale(1);
  }
}

.animacion{
  animation:aparecer 1.5s ease;
}

.final{
  margin-top:40px;
  font-size:28px;
  color:pink;
}
</style>
</head>

<body>

<div id="login">
  <h1>🔒 Mensaje privado</h1>

  <input
    type="password"
    id="clave"
    placeholder="Contraseña">

  <button onclick="entrar()">
    Entrar
  </button>

  <p id="error"></p>
</div>

<div id="contenido">

  <h1>❤️ Bienvenida ❤️</h1>

  <video width="80%" controls>
    <source src="video.mp4" type="video/mp4">
  </video>

  <br><br>

  <a href="mensaje.pdf" target="_blank">
    <button>📄 Leer mensaje</button>
  </a>

  <div class="final">
    Gracias por todo, mi swiftie favorita ❤️
  </div>

</div>

<script>
function entrar(){

  if(document.getElementById("clave").value==="swiftie"){

    document.getElementById("login").style.display="none";

    const contenido =
      document.getElementById("contenido");

    contenido.style.display="block";
    contenido.classList.add("animacion");

  }else{

    document.getElementById("error").innerText =
      "Contraseña incorrecta";
  }
}
</script>

</body>
</html>
